<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 연동 완료</title>
</head>
<body>

    <h1>🔥 파이어베이스 연결 성공!</h1>
    <p>브라우저에서 <strong>F12키</strong>를 눌러 <strong>Console(콘솔)</strong> 탭을 확인해보세요.</p>

    <script type="module">
        // 최신 Firebase v11 라이브러리 가져오기 (CDN 방식)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics.js";

        // 제공해주신 파이어베이스 계정 설정 정보
        const firebaseConfig = {
            apiKey: "AIzaSyDUpGBhlcUsduzA2QC-DGHHWQtJWb5chDc",
            authDomain: "sr-test-79934.firebaseapp.com",
            projectId: "sr-test-79934",
            storageBucket: "sr-test-79934.firebasestorage.app",
            messagingSenderId: "731838192460",
            appId: "1:731838192460:web:7be3fca3574a1b008e4de9",
            measurementId: "G-M33HTN1DBX"
        };

        // Firebase 및 Analytics 초기화
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        
        // 연결 확인용 로그
        console.log("Firebase가 성공적으로 연결되었습니다!", app);
        console.log("Analytics가 활성화되었습니다.", analytics);
    </script>
</body>
</html>
