<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 연동 테스트</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .status {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 6px;
            background: #e8f5e9;
            color: #2e7d32;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Firebase 연결 상태 결과</h2>
        <div id="firebase-status" class="status">확인 중...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUpGBhlcUsduzA2QC-DGHHWQtJWb5chDc",
            authDomain: "sr-test-79934.firebaseapp.com",
            projectId: "sr-test-79934",
            storageBucket: "sr-test-79934.firebasestorage.app",
            messagingSenderId: "731838192460",
            appId: "1:731838192460:web:7be3fca3574a1b008e4de9",
            measurementId: "G-M33HTN1DBX"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const analytics = getAnalytics(app);
            
            // 화면의 텍스트를 성공 메시지로 변경
            document.getElementById('firebase-status').textContent = "✅ 파이어베이스 연결 성공!";
            console.log("연결 성공:", app);
        } catch (error) {
            document.getElementById('firebase-status').textContent = "❌ 연결 실패";
            document.getElementById('firebase-status').style.background = "#ffebee";
            document.getElementById('firebase-status').style.color = "#c62828";
            console.error(error);
        }
    </script>
</body>
</html>
