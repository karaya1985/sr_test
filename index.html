<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리들의 방명록 (Firebase 연동형)</title>
  <style>
    /* ================= 꾸미기 (CSS) ================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #2b2b3a;
      background: #f4f1ec;
      -webkit-font-smoothing: antialiased;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }

    /* ---------- 표지 화면 ---------- */
    #cover {
      display: none;
      align-items: center; justify-content: center; text-align: center;
      background: linear-gradient(160deg, #6a5acd 0%, #8e7cc3 45%, #d8b4a0 100%);
      color: #fff; padding: 24px; min-height: 100vh;
    }
    #cover.active { display: flex; }
    .cover-inner { max-width: 480px; }
    .cover-emoji { font-size: 64px; margin-bottom: 12px; }
    #cover h1 { font-size: 40px; letter-spacing: -1px; margin-bottom: 14px; }
    #cover p { font-size: 17px; opacity: .92; line-height: 1.6; margin-bottom: 36px; }
    .enter-btn {
      background: #fff; color: #6a5acd; border: none;
      padding: 16px 44px; font-size: 18px; font-weight: 700;
      border-radius: 999px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .enter-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,.24); }
    .enter-btn:active { transform: translateY(0); }

    /* ---------- 보드 화면 ---------- */
    .board-top {
      position: sticky; top: 0; z-index: 10;
      background: rgba(244,241,236,.9); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid #e6e2da;
    }
    .board-top h2 { font-size: 22px; letter-spacing: -.5px; }
    .board-top .left { display: flex; align-items: center; gap: 10px; }
    .back-link {
      background: none; border: none; color: #6a5acd;
      font-size: 14px; cursor: pointer;
    }
    .add-btn {
      background: #6a5acd; color: #fff; border: none;
      padding: 10px 18px; font-size: 15px; font-weight: 700;
      border-radius: 999px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(106,90,205,.35);
      transition: background .15s ease;
    }
    .add-btn:hover { background: #5a4bbf; }

    /* 패들렛 스타일 카드 보드 (벽돌형 레이아웃) */
    .board {
      column-count: 3; column-gap: 16px;
      padding: 20px; max-width: 960px; margin: 0 auto;
    }
    @media (max-width: 760px) { .board { column-count: 2; } }
    @media (max-width: 480px) { .board { column-count: 1; } }

    .note {
      break-inside: avoid;
      background: #fff; border-radius: 14px;
      padding: 16px; margin-bottom: 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,.06);
      border-top: 4px solid var(--c, #6a5acd);
    }
    .note-name { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .note-msg { font-size: 14.5px; line-height: 1.6; white-space: pre-wrap; }
    .note-photo { margin-top: 12px; width: 100%; border-radius: 10px; display: block; }
    .note-time { font-size: 11px; color: #b3ada3; margin-top: 10px; }

    .empty {
      text-align: center; color: #b3ada3; padding: 60px 20px;
      column-span: all;
    }

    /* ---------- 작성 창 (모달) ---------- */
    .modal-bg {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      background: rgba(30,25,50,.45);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-bg.active { display: flex; }
    .modal {
      background: #fff; border-radius: 18px;
      width: 100%; max-width: 440px;
      padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .modal h3 { font-size: 19px; margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
    .field input[type="text"], .field textarea {
      width: 100%; border: 1px solid #e0ddd6; border-radius: 10px;
      padding: 11px 12px; font-size: 15px; font-family: inherit; background: #fafaf8;
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input:focus, .field textarea:focus { outline: none; border-color: #6a5acd; background: #fff; }

    .photo-row { display: flex; align-items: center; gap: 12px; }
    .photo-btn { background: #f0edff; color: #6a5acd; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #fileInput { display: none; }
    #preview { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; display: none; border: 1px solid #e0ddd6; }

    .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
    .btn-cancel { flex: 1; background: #f0eee9; color: #666; border: none; padding: 13px; font-size: 15px; font-weight: 600; border-radius: 11px; cursor: pointer; }
    .btn-save { flex: 2; background: #6a5acd; color: #fff; border: none; padding: 13px; font-size: 15px; font-weight: 700; border-radius: 11px; cursor: pointer; }
    .btn-save:hover { background: #5a4bbf; }
    .status-msg { text-align: center; font-size: 13px; color: #c0392b; min-height: 16px; margin-top: 8px; }
  </style>
</head>
<body>

  <section id="cover" class="active">
    <div class="cover-inner">
      <div class="cover-emoji">📖</div>
      <h1>우리들의 방명록</h1>
      <p>입장해서 보드를 둘러보고,<br />+ 버튼으로 흔적을 남겨보세요.</p>
      <button class="enter-btn" onclick="enter()">입장하기 →</button>
    </div>
  </section>

  <section id="board" class="screen">
    <div class="board-top">
      <div class="left">
        <button class="back-link" onclick="goCover()">←</button>
        <h2>📖 방명록</h2>
      </div>
      <button class="add-btn" onclick="openModal()">+ 추가하기</button>
    </div>
    <div class="board" id="notes"></div>
  </section>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>✏️ 방명록 남기기</h3>
      <div class="field">
        <label for="nameInput">이름</label>
        <input type="text" id="nameInput" placeholder="이름 또는 닉네임" maxlength="20" />
      </div>
      <div class="field">
        <label for="msgInput">메시지</label>
        <textarea id="msgInput" placeholder="남기고 싶은 말을 적어주세요" maxlength="500"></textarea>
      </div>
      <div class="field">
        <label>사진 (선택)</label>
        <div class="photo-row">
          <label for="fileInput" class="photo-btn">📷 사진 선택</label>
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)" />
          <img id="preview" alt="미리보기" />
        </div>
      </div>
      <div class="status-msg" id="statusMsg"></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-save" id="btnSave" onclick="submitEntry()">남기기</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // 제공해주신 Firebase 설정 정보
    const firebaseConfig = {
      apiKey: "AIzaSyDUpGBhlcUsduzA2QC-DGHHWQtJWb5chDc",
      authDomain: "sr-test-79934.firebaseapp.com",
      projectId: "sr-test-79934",
      storageBucket: "sr-test-79934.firebasestorage.app",
      messagingSenderId: "731838192460",
      appId: "1:731838192460:web:7be3fca3574a1b008e4de9",
      measurementId: "G-M33HTN1DBX"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 전역 상태 변수
    let selectedFileBase64 = null; 
    const colors = ["#6a5acd", "#e07a5f", "#3d9970", "#e6a817", "#c0559f", "#2e86de"];

    /* ================= 화면 전환 함수 선언 (전역 바인딩) ================= */
    window.enter = function() {
      document.getElementById("cover").classList.remove("active");
      document.getElementById("board").classList.add("active");
      window.scrollTo(0, 0);
    }
    window.goCover = function() {
      document.getElementById("board").classList.remove("active");
      document.getElementById("cover").classList.add("active");
    }

    /* ================= 모달 제어 ================= */
    window.openModal = function() {
      document.getElementById("modalBg").classList.add("active");
    }
    window.closeModal = function() {
      document.getElementById("modalBg").classList.remove("active");
      resetForm();
    }
    function resetForm() {
      document.getElementById("nameInput").value = "";
      document.getElementById("msgInput").value = "";
      document.getElementById("fileInput").value = "";
      document.getElementById("preview").style.display = "none";
      document.getElementById("statusMsg").textContent = "";
      document.getElementById("btnSave").disabled = false;
      document.getElementById("btnSave").textContent = "남기기";
      selectedFileBase64 = null;
    }

    /* ================= 사진 선택 및 압축 처리 ================= */
    window.handleFile = function(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const img = new Image();
        img.onload = function () {
          const maxW = 600;
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement("canvas");
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          
          selectedFileBase64 = canvas.toDataURL("image/jpeg", 0.7);
          const preview = document.getElementById("preview");
          preview.src = selectedFileBase64;
          preview.style.display = "block";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    /* ================= 데이터 업로드 (Firebase 저장) ================= */
    window.submitEntry = async function() {
      const name = document.getElementById("nameInput").value.trim();
      const msg = document.getElementById("msgInput").value.trim();
      const status = document.getElementById("statusMsg");
      const btnSave = document.getElementById("btnSave");

      if (!name || !msg) {
        status.textContent = "이름과 메시지를 모두 입력해주세요.";
        return;
      }

      try {
        btnSave.disabled = true;
        btnSave.textContent = "저장 중...";
        status.textContent = "";

        let photoUrl = null;

        // 이미지가 선택되었다면 Firebase Storage에 업로드
        if (selectedFileBase64) {
          const filename = "images/" + Date.now() + "_" + Math.random().toString(36).substring(2, 7) + ".jpg";
          const storageRef = ref(storage, filename);
          // base64 dataurl 포맷 문자열 업로드
          await uploadString(storageRef, selectedFileBase64, 'data_url');
          photoUrl = await getDownloadURL(storageRef);
        }

        // Firestore 'guestbook' 컬렉션에 데이터 삽입
        await addDoc(collection(db, "guestbook"), {
          name: name,
          message: msg,
          photo: photoUrl,
          createdAt: Date.now(), // 정렬용 타임스탬프
          timeString: new Date().toLocaleString("ko-KR"),
          colorIndex: Math.floor(Math.random() * colors.length) // 랜덤 컬러 부여
        });

        closeModal();
      } catch (error) {
        console.error("에러 발생:", error);
        status.textContent = "오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
        btnSave.disabled = false;
        btnSave.textContent = "남기기";
      }
    }

    /* ================= 데이터 실시간 수신 및 보드 렌더링 ================= */
    const q = query(collection(db, "guestbook"), orderBy("createdAt", "desc"));
    
    // Firestore 실시간 리스너 연결
    onSnapshot(q, (snapshot) => {
      const box = document.getElementById("notes");
      if (snapshot.empty) {
        box.innerHTML = '<div class="empty">아직 방명록이 없어요.<br>+ 추가하기로 첫 글을 남겨보세요!</div>';
        return;
      }
      
      box.innerHTML = "";
      snapshot.forEach((doc) => {
        const d = doc.data();
        const note = document.createElement("div");
        note.className = "note";
        
        // 데이터에 컬러가 지정되어있지 않으면 임의 배정
        const noteColor = colors[d.colorIndex !== undefined ? d.colorIndex : 0];
        note.style.setProperty("--c", noteColor);
        
        note.innerHTML =
          '<div class="note-name"></div>' +
          '<div class="note-msg"></div>'
